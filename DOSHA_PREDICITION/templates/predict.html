{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-teal-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-heartbeat text-teal-600 text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Dosha Prediction</h2>
            <p class="text-gray-600">Enter your vital signs to discover your Dosha type</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Humidity (%)</label>
                    <div class="relative">
                        <i class="fas fa-tint absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="number" name="humidity" step="0.01" required 
                               class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                               placeholder="e.g., 60.19">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Temperature (°C)</label>
                    <div class="relative">
                        <i class="fas fa-thermometer-half absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="number" name="temperature" step="0.01" required 
                               class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                               placeholder="e.g., 36.5">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">SpO2 (%)</label>
                    <div class="relative">
                        <i class="fas fa-lungs absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="number" name="spo2" step="0.01" required 
                               class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                               placeholder="e.g., 94.11">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Blood Pressure (mmHg)</label>
                    <div class="relative">
                        <i class="fas fa-heart absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="number" name="bp" step="0.01" required 
                               class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                               placeholder="e.g., 147.67">
                    </div>
                </div>
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-teal-600 to-blue-600 text-white py-4 rounded-lg hover:from-teal-700 hover:to-blue-700 transition-all duration-300 flex items-center justify-center space-x-2 text-lg font-semibold">
                <i class="fas fa-magic"></i>
                <span>Predict My Dosha</span>
            </button>
        </form>
        
        <div class="mt-8 p-4 bg-blue-50 rounded-lg">
            <h3 class="font-semibold text-blue-800 mb-2">Sample Values:</h3>
            <p class="text-sm text-blue-700">Humidity: 60.19%, Temperature: 36.5°C, SpO2: 94.11%, BP: 147.67 mmHg</p>
        </div>
    </div>
</div>
{% endblock %}
